<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg" href="./img/speech-kb.svg">
    <link rel="stylesheet" href="./js/mod/basic-ui.css" />
    <style>
        :root {
            --color-for-edit: white;
            --color-for-edit: orange;
            --color-for-edit: lightblue;
            --color-for-edit: yellow;
            --color-for-advanced: blueviolet;
            --color-for-advanced: #b27de3;
            --color-text-for-advanced: black;
            background-color: black;
            background-color: #130b0b;
            color: white;
        }



        header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;

            h1 {
                font-size: 15px;
                margin: 0;
            }
        }

        button#doc {
            color: black;
            background: #f4ebe1;
            background-color: transparent;
            color: unset;
            color: var(--color-for-edit);
            padding: 4px;
            border-radius: 4px;
            width: fit-content;
            NOmin-width: calc(60vw);
            max-width: calc(100vw - 70px);
            display: flex;
            justify-content: space-between;
        }

        button#doc:hover {
            color: darkred;
            color: yellow;
            color: goldenrod;
            color: orange;
        }

        #beside-logo {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #result-log {
            border: 2px dotted red;
            background: yellow;
            display: none;
        }

        #logo {
            display: block;
            width: 60px;
            height: 60px;
            background-image: url(./img/speech-kb.svg);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            /* outline: 1px dotted red; */
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
        }

        #inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #on-off-buttons {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        #the-mic {
            /* outline: 4px dotted red; */
            display: flex;
        }

        #edit-buttons {
            margin-top: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;

            button {
                background-color: var(--color-for-edit);
                border: 1px solid #3333;
                border-radius: 10px;
                width: 32px;
                height: 32px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 18px;
                font-weight: bold;
            }
        }

        #minor-edit-buttons {
            display: flex;
            gap: 10px;
        }

        #major-edit-buttons {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        #btn-key {
            background-color: blueviolet;
            background-color: var(--color-for-advanced);
            color: var(--color-text-for-advanced);
            display: flex;
            align-items: center;
            font-size: 16px;
            visibility: hidden;
        }

        .websocket-model #btn-key {
            visibility: visible;
        }


        #debug {
            margin-top: 5px;
            outline: 1px solid red;
            color: orange;
            min-height: 120px;
            max-height: 120px;
            overflow: auto;
            display: flex;
            display: none;
            flex-direction: row;
            /* gap: 5px; */
            flex-wrap: wrap;
            line-height: 1;

            div {
                margin-right: 5px;
            }

            div:first-child {
                color: red;
            }
        }

        .show-debug #debug {
            display: flex;
        }

        #output-text {
            .final-out:last-child {
                background-color: var(--color-for-edit);
            }

            .final-out {
                display: inline;
                padding-right: 9px;
            }
        }

        #output-text {
            width: 100%;
            min-height: 80px;
            /* max-height: 80px; */
            max-height: calc(100dvh - 280px);
            padding: 10px;
            overflow-y: auto;
            border-radius: 4px;
            color: black;
            background: #ccc;
            background: #dfd0b9;
            background: #fdfbf7;
            background: #f9f6f0;
            background: #f5f2eb;
            background: #E6DEC9;
            background: #DFD0B9;
            background: #F6F1EE;
            background: #A2A392;
            background: #948474;
            background: #f4ebe1;
        }

        select.select-lang {
            background-color: #ccc;
            padding: 8px 8px;
            border-radius: 8px;
            outline: none;
        }

        /* .websocket-model #speech-lang-chrome { */
        .websocket-model #container-chrome {
            display: none;
        }

        select#speech-lang-deepgram {
            /* display: none; */
            background-color: blueviolet;
            background-color: var(--color-for-advanced);
            color: var(--color-text-for-advanced);
        }

        #container-deepgram {
            display: none;
        }

        /* .websocket-model select#speech-lang-deepgram { */
        .websocket-model #container-deepgram {
            display: block;
        }



        .mic-btn {
            background-size: contain;
            NOoutline: 1px dotted red;
            width: 48px;
            height: 48px;
            cursor: pointer;
        }

        #mic-on {
            display: none;
        }

        .mic-is-on {
            #mic-on {
                display: block;
            }

            #mic-off {
                display: none;
            }
        }

        /*
        :not(.mic-is-on #mic-off) {
            display: block;
        }
        #mic-off:not(.mic-is-on) {
            display: block;
        }
        */



        #doc-name {
            color: red;
            opacity: 0;
        }

        .has-doc #doc-name {
            color: unset;
            NOopacity: unset;
        }

        #elt-docs {
            display: flex;
            flex-direction: column;
            gap: 10px;

            button {
                padding: 4px;
                border-radius: 3px;
                border-width: 0.5px;
                background-color: #fff8;
                border-color: currentColor;
            }

            button:hover {
                color: green;
            }
        }

        select.select-lang:disabled {
            outline: 4px solid greenyellow;
            background: wheat;
            color: black;
        }

        select.select-lang {
            position: relative;
        }

        select.select-lang:disabled::after {
            content: "locked";
            color: red;
            position: absolute;
            top: 0;
            left: 0;
            outline: 2px dotted red;
        }


        div.select-container {
            position: relative;
            display: inline-block;
        }

        div.select-container:has(select:disabled)::after {
            content: '✔';
            position: absolute;
            font-size: 16px;
            color: greenyellow;
            transform: translate(-13px, -32%);
            outline: 3px solid;
            background: black;
            padding: 2px;
        }

        #elt-advanced-key-status {
            background-color: lightgray;
            font-style: italic;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        #the-model {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .mic-is-on #the-model {
            /* display: none; */
            visibility: hidden;
        }

        dialog:has(#textarea-edit) {
            width: 95dvw;
            max-width: unset;
        }

        #textarea-edit {
            width: 100%;
            NOmax-width: 80dvw;
            NOheight: 80dvh;
            height: calc(80dvh - 50px);
            border: none !important;
            outline: 4px solid greenyellow !important;
            border-radius: 4px;
            padding: 4px;

            /* 2. Choose the smaller option: normal dynamic height OR the active keyboard area */
            max-height: min(80dvh, calc(var(--visible-height, 100dvh) - 20px));

            /* 3. Ensure your layout shifts smoothly instead of jumping violently */
            transition: max-height 0.15s ease-out;
        }

        dialog:has(#textarea-edit) {
            background-color: yellowgreen;

            div.dialog-buttons {
                padding-top: 10px;
                padding-bottom: 10px;
            }
        }

        dialog:has(#textarea-edit) div {
            padding: 15px;
            padding-bottom: 0;
            /* margin-top: 20px; */
        }
    </style>
    <script src="./init-error-new.js"></script>
    <script src="./importmaps.js"></script>
</head>

<body>
    <header>
        <span id="logo" aria-label="Logo"></span>
        <div id="beside-logo">
            <h1>Speech Writer 0.83</h1>
            <button id="doc">
                <span id="doc-name" title="- Handle documents"></span>
                <span style="margin-left:20px;">⋮</span>
            </button>
        </div>
    </header>


    <div id="inputs">
        <label>
            <div class="select-container" id="container-chrome">
                <select class="select-lang" id="speech-lang-chrome" name="speech-lang-chrome">
                    <!-- Arabic -->
                    <optgroup label="Arabic">
                        <option value="ar-EG">Arabic (Egypt)</option>
                        <option value="ar-SA">Arabic (Saudi Arabia)</option>
                        <option value="ar-AE">Arabic (UAE)</option>
                    </optgroup>

                    <!-- Chinese -->
                    <optgroup label="Chinese">
                        <option value="zh-CN">Chinese (Mandarin Simplified)</option>
                        <option value="zh-TW">Chinese (Taiwanese Mandarin)</option>
                        <option value="zh-HK">Chinese (Hong Kong Cantonese)</option>
                    </optgroup>

                    <!-- English -->
                    <optgroup label="English">
                        <option value="en-US" selected>English (United States)</option>
                        <option value="en-GB">English (United Kingdom)</option>
                        <option value="en-AU">English (Australia)</option>
                        <option value="en-CA">English (Canada)</option>
                        <option value="en-IN">English (India)</option>
                        <option value="en-NZ">English (New Zealand)</option>
                        <option value="en-ZA">English (South Africa)</option>
                    </optgroup>

                    <!-- French -->
                    <optgroup label="French">
                        <option value="fr-FR">French (France)</option>
                        <option value="fr-CA">French (Canada)</option>
                        <option value="fr-CH">French (Switzerland)</option>
                    </optgroup>

                    <!-- German -->
                    <optgroup label="German">
                        <option value="de-DE">German (Germany)</option>
                        <option value="de-AT">German (Austria)</option>
                        <option value="de-CH">German (Switzerland)</option>
                    </optgroup>

                    <!-- Italian -->
                    <optgroup label="Italian">
                        <option value="it-IT">Italian (Italy)</option>
                        <option value="it-CH">Italian (Switzerland)</option>
                    </optgroup>

                    <!-- Japanese & Korean -->
                    <optgroup label="East Asian">
                        <option value="ja-JP">Japanese</option>
                        <option value="ko-KR">Korean</option>
                    </optgroup>

                    <!-- Portuguese -->
                    <optgroup label="Portuguese">
                        <option value="pt-BR">Portuguese (Brazil)</option>
                        <option value="pt-PT">Portuguese (Portugal)</option>
                    </optgroup>

                    <!-- Spanish -->
                    <optgroup label="Spanish">
                        <option value="es-ES">Spanish (Spain)</option>
                        <option value="es-MX">Spanish (Mexico)</option>
                        <option value="es-US">Spanish (United States)</option>
                        <option value="es-AR">Spanish (Argentina)</option>
                        <option value="es-CO">Spanish (Colombia)</option>
                    </optgroup>

                    <!-- Other Languages -->
                    <optgroup label="Other Major Languages">
                        <option value="ca-ES">Catalan</option>
                        <option value="cs-CZ">Czech</option>
                        <option value="da-DK">Danish</option>
                        <option value="nl-NL">Dutch (Netherlands)</option>
                        <option value="fi-FI">Finnish</option>
                        <option value="el-GR">Greek</option>
                        <option value="he-IL">Hebrew</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="hu-HU">Hungarian</option>
                        <option value="id-ID">Indonesian</option>
                        <option value="no-NO">Norwegian</option>
                        <option value="pl-PL">Polish</option>
                        <option value="ro-RO">Romanian</option>
                        <option value="ru-RU">Russian</option>
                        <option value="sv-SE">Swedish</option>
                        <option value="th-TH">Thai</option>
                        <option value="tr-TR">Turkish</option>
                        <option value="uk-UA">Ukrainian</option>
                        <option value="vi-VN">Vietnamese</option>
                    </optgroup>
                </select>
            </div>
            <div class="select-container" id="container-deepgram">
                <select class="select-lang" name="deepgram_language" id="speech-lang-deepgram">
                    <option value="" disabled selected>Select a language...</option>

                    <!-- Core & English Variants -->
                    <optgroup label="English & Core Models">
                        <option value="en" selected>English (General/Default)</option>
                        <option value="en-US">English - United States (en-US)</option>
                        <option value="en-GB">English - United Kingdom (en-GB)</option>
                        <option value="en-AU">English - Australia (en-AU)</option>
                        <option value="en-IN">English - India (en-IN)</option>
                        <option value="multi">Multilingual Code-Switching (multi)</option>
                    </optgroup>

                    <!-- Core Global Languages -->
                    <optgroup label="Core Global Languages">
                        <option value="es">Spanish (es)</option>
                        <option value="fr">French (fr)</option>
                        <option value="de">German (de)</option>
                        <option value="hi">Hindi (hi)</option>
                        <option value="it">Italian (it)</option>
                        <option value="ja">Japanese (ja)</option>
                        <option value="nl">Dutch (nl)</option>
                        <option value="pt">Portuguese (pt)</option>
                        <option value="ru">Russian (ru)</option>
                    </optgroup>

                    <!-- European Extensions -->
                    <optgroup label="European Extensions">
                        <option value="be">Belarusian (be)</option>
                        <option value="bs">Bosnian (bs)</option>
                        <option value="bg">Bulgarian (bg)</option>
                        <option value="ca">Catalan (ca)</option>
                        <option value="hr">Croatian (hr)</option>
                        <option value="cs">Czech (cs)</option>
                        <option value="da">Danish (da)</option>
                        <option value="et">Estonian (et)</option>
                        <option value="fi">Finnish (fi)</option>
                        <option value="nl-BE">Flemish (nl-BE)</option>
                        <option value="de-CH">German - Switzerland (de-CH)</option>
                        <option value="el">Greek (el)</option>
                        <option value="hu">Hungarian (hu)</option>
                        <option value="lv">Latvian (lv)</option>
                        <option value="lt">Lithuanian (lt)</option>
                        <option value="mk">Macedonian (mk)</option>
                        <option value="ro">Romanian (ro)</option>
                        <option value="sr">Serbian (sr)</option>
                        <option value="sk">Slovak (sk)</option>
                        <option value="sl">Slovenian (sl)</option>
                        <option value="sv">Swedish (se)</option>
                    </optgroup>

                    <!-- Asia-Pacific & Indic Extensions -->
                    <optgroup label="Asia-Pacific & Indic Extensions">
                        <option value="bn">Bengali (bn)</option>
                        <option value="zh-HK">Cantonese Traditional (zh-HK)</option>
                        <option value="gu">Gujarati (gu)</option>
                        <option value="id">Indonesian (id)</option>
                        <option value="kn">Kannada (kn)</option>
                        <option value="ms">Malay (ms)</option>
                        <option value="zh-CN">Mandarin Simplified (zh-CN)</option>
                        <option value="zh-TW">Mandarin Traditional (zh-TW)</option>
                        <option value="mr">Marathi (mr)</option>
                        <option value="tl">Tagalog (tl)</option>
                        <option value="ta">Tamil (ta)</option>
                        <option value="te">Telugu (te)</option>
                        <option value="th">Thai (th)</option>
                    </optgroup>
                </select>
            </div>

        </label>
        <div id="on-off-buttons"></div>
        <!-- <div id="mic-status">(Not started)</div> -->
    </div>
    <p id="result-log"> RESULT LOG: </p>
    <div id="output-text"> </div>
    <div id="edit-buttons" inert>
        <div id="minor-edit-buttons"></div>
        <div id="major-edit-buttons"></div>
    </div>
    <div id="debug"></div>


    <script src="./speech-kb.js" type="module"></script>
</body>

</html>
