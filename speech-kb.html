<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg" href="./img/speech-kb.svg">
    <style>
        :root {
            --color-for-edit: white;
            --color-for-edit: orange;
            --color-for-edit: lightblue;
            --color-for-edit: yellow;
        }

        [inert] {
            cursor: default;
            filter: grayscale(1);
            opacity: 0.8;
            color: gray;
            outline: dotted 4px red !important;

            input[type=radio] {
                opacity: 0.5;
            }

            button {
                color: white;
            }
        }

        #result-log {
            border: 2px dotted red;
            background: yellow;
            display: none;
        }

        #logo {
            display: block;
            width: 60px;
            height: 60px;
            background-image: url(./img/speech-kb.svg);
            outline: 1px dotted red;
        }

        #inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #buttons {
            display: flex;
            gap: 10px;
        }

        #edit-buttons {
            display: flex;
            gap: 15px;
            margin-top: 2px;

            button {
                background: yellow;
                background: lightblue;
                background-color: var(--color-for-edit);
                border: 1px solid gray;
                border-radius: 10px;
                padding: 4px;
                aspect-ratio: 1 / 1;
                width: 32px;
                display: flex;
                justify-content: center;
                align-items: center;

            }
        }

        #debug {
            color: red;
            outline: 2px solid red;
            min-height: 80px;
        }
        #output-text {
            .final-out:last-child {
                background-color: var(--color-for-edit);
            }
        }

        #output-text {
            width: 100%;
            min-height: 80px;
            background: #ccc;
            padding: 10px;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
    <script src="./init-error-new.js"></script>
</head>

<body>
    <span id="logo"></span>
    <h1>Speech keyboard</h1>


    <div id="inputs">
        <label>Select Speech Language:
            <select id="speech-lang" name="speech-lang">
                <!-- Arabic -->
                <optgroup label="Arabic">
                    <option value="ar-EG">Arabic (Egypt)</option>
                    <option value="ar-SA">Arabic (Saudi Arabia)</option>
                    <option value="ar-AE">Arabic (UAE)</option>
                </optgroup>

                <!-- Chinese -->
                <optgroup label="Chinese">
                    <option value="zh-CN" selected>Chinese (Mandarin Simplified)</option>
                    <option value="zh-TW">Chinese (Taiwanese Mandarin)</option>
                    <option value="zh-HK">Chinese (Hong Kong Cantonese)</option>
                </optgroup>

                <!-- English -->
                <optgroup label="English">
                    <option value="en-US" selected>English (United States)</option>
                    <option value="en-GB">English (United Kingdom)</option>
                    <option value="en-AU">English (Australia)</option>
                    <option value="en-CA">English (Canada)</option>
                    <option value="en-IN">English (India)</option>
                    <option value="en-NZ">English (New Zealand)</option>
                    <option value="en-ZA">English (South Africa)</option>
                </optgroup>

                <!-- French -->
                <optgroup label="French">
                    <option value="fr-FR">French (France)</option>
                    <option value="fr-CA">French (Canada)</option>
                    <option value="fr-CH">French (Switzerland)</option>
                </optgroup>

                <!-- German -->
                <optgroup label="German">
                    <option value="de-DE">German (Germany)</option>
                    <option value="de-AT">German (Austria)</option>
                    <option value="de-CH">German (Switzerland)</option>
                </optgroup>

                <!-- Italian -->
                <optgroup label="Italian">
                    <option value="it-IT">Italian (Italy)</option>
                    <option value="it-CH">Italian (Switzerland)</option>
                </optgroup>

                <!-- Japanese & Korean -->
                <optgroup label="East Asian">
                    <option value="ja-JP">Japanese</option>
                    <option value="ko-KR">Korean</option>
                </optgroup>

                <!-- Portuguese -->
                <optgroup label="Portuguese">
                    <option value="pt-BR">Portuguese (Brazil)</option>
                    <option value="pt-PT">Portuguese (Portugal)</option>
                </optgroup>

                <!-- Spanish -->
                <optgroup label="Spanish">
                    <option value="es-ES">Spanish (Spain)</option>
                    <option value="es-MX">Spanish (Mexico)</option>
                    <option value="es-US">Spanish (United States)</option>
                    <option value="es-AR">Spanish (Argentina)</option>
                    <option value="es-CO">Spanish (Colombia)</option>
                </optgroup>

                <!-- Other Languages -->
                <optgroup label="Other Major Languages">
                    <option value="ca-ES">Catalan</option>
                    <option value="cs-CZ">Czech</option>
                    <option value="da-DK">Danish</option>
                    <option value="nl-NL">Dutch (Netherlands)</option>
                    <option value="fi-FI">Finnish</option>
                    <option value="el-GR">Greek</option>
                    <option value="he-IL">Hebrew</option>
                    <option value="hi-IN">Hindi</option>
                    <option value="hu-HU">Hungarian</option>
                    <option value="id-ID">Indonesian</option>
                    <option value="no-NO">Norwegian</option>
                    <option value="pl-PL">Polish</option>
                    <option value="ro-RO">Romanian</option>
                    <option value="ru-RU">Russian</option>
                    <option value="sv-SE">Swedish</option>
                    <option value="th-TH">Thai</option>
                    <option value="tr-TR">Turkish</option>
                    <option value="uk-UA">Ukrainian</option>
                    <option value="vi-VN">Vietnamese</option>
                </optgroup>
            </select>
        </label>
        <div id="buttons"></div>
        <div id="mic-status">(Not started)</div>
    </div>
    <p id="result-log"> RESULT LOG: </p>
    <div id="output-text"> </div>
    <div id="edit-buttons"></div>
    <div id="debug"></div>


    <script type="module">
        const eltMicStatus = document.getElementById("mic-status");
        const langSelect = document.getElementById('speech-lang');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        // CRITICAL: Set to true so the microphone stays open 
        // even when you pause between words.
        recognition.continuous = true;
        recognition.interimResults = true; // Show results live as you speak
        recognition.lang = 'en-US';

        // --- CONTROLS ---

        // 1. START: Turns on microphone, begins listening
        function startListening() {
            recognition.lang = langSelect.value;
            recognition.start();
        }

        // 2. STOP: Stops listening and FINISHES processing current speech
        function stopListening() {
            recognition.stop();
        }

        // 3. ABORT: Instantly kills the microphone and THROWS AWAY current speech
        function cancelListening() {
            recognition.abort();
            eltMicStatus.textContent = "Speech recognition canceled instantly.";
        }

        // --- LIFECYCLE EVENTS ---













        ///////////////////////////////////
        // Testing Lovable:

        const isAndroid = /android/i.test(navigator.userAgent);

        let shouldKeepListening = false;
        let hasCommitted = false;
        let finalText = "";

        recognition.continuous = !isAndroid;   // true on Windows, false on Android
        recognition.interimResults = true;

        recognition.addEventListener("start", () => {
            hasCommitted = false;
            finalText = "";
            // showListening(true);
        });

        recognition.onresult = (event) => {
            // Walk only new results this event delivered
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const r = event.results[i];
                if (r.isFinal) {
                    const utterance = r[0].transcript.trim();
                    if (utterance) {
                        // Desktop (continuous): commit each final utterance as it arrives
                        // Android (single-shot): accumulate, commit once in this session
                        if (isAndroid) {
                            finalText = utterance;
                        } else {
                            yourAppHandleResult(utterance);
                        }
                    }
                }
            }

            if (isAndroid && finalText && !hasCommitted) {
                hasCommitted = true;
                yourAppHandleResult(finalText);
            }
        };

        function debugOutput(txt) {
            const elt = mkElt("div", undefined, txt);
            const eltDebug = document.getElementById("debug");
            eltDebug.appendChild(elt);
        }
        debugOutput("TEST DEBUG"); debugOutput("TEST again");
        // recognition.onerror = (e) => {
        recognition.onerror = (e) => {
            debugOutput(e.error);

            // no-speech / aborted are normal between phrases on Android
            if (e.error !== "no-speech" && e.error !== "aborted") {
                shouldKeepListening = false;
            }
            hasCommitted = true; // block stale commit in onend
        };

        recognition.addEventListener("end", () => {
            // Android safety net: commit if onresult never finalised
            if (isAndroid && !hasCommitted && finalText) {
                hasCommitted = true;
                yourAppHandleResult(finalText);
            }

            // Auto-restart:
            //  - Android: required after every utterance (continuous is ignored)
            //  - Windows: only restarts if the engine itself stopped (silence timeout, error)
            if (shouldKeepListening) {
                try {
                    recognition.start();
                } catch (_) {
                    // already starting — ignore
                }
            }
        });

        // To begin dictation:
        // shouldKeepListening = true; recognition.start();
        //
        // To pause (your pause button):
        // shouldKeepListening = false; recognition.stop();











        // Example: Replace with your app's function
        function yourAppHandleResult(text) {
            console.log("Reporting to app:", text);
            // Your app logic here (e.g., update a textarea, send to server, etc.)
            const eltOut = mkElt("div", undefined, text);
            eltOut.classList.add("final-out");
            const eltOutputText = document.getElementById("output-text");
            eltOutputText.appendChild(eltOut);
            eltOut.scrollIntoView();
        }
        // Fires when the engine completely disconnects
        /*
        recognition.onend = () => {
            eltMicStatus.textContent = "Recognition session has fully ended.";
        };
        */

        displayPage();
        function displayPage() {
            const btnStart = mkElt("button", { id: "btn-start" }, "Start");
            const btnStop = mkElt("button", { id: "btn-stop" }, "Stop");
            // btnStop.inert = true;
            showListening(false);
            recognition.addEventListener("start", () => {
                showListening(true);
            });
            recognition.addEventListener("end", () => {
                showListening(false);
            });
            btnStart.addEventListener("click", evt => {
                evt.stopPropagation();
                // showListening(true);
                startListening();
            });
            btnStop.addEventListener("click", evt => {
                evt.stopPropagation();
                // showListening(false);
                stopListening();
            });

            function showListening(on) {
                if (on) {
                    btnStart.inert = true;
                    btnStop.inert = false;
                    eltMicStatus.textContent = "Microphone is active. Speak now...";
                } else {
                    btnStart.inert = false;
                    btnStop.inert = true;
                    eltMicStatus.textContent = "Microphone is off.";
                }
            }
            const divButtons = document.getElementById("buttons");
            divButtons.append(btnStart, btnStop);

            const btnDot = mkElt("button", undefined, ".");
            const btnExclamation = mkElt("button", undefined, "!");
            const btnQuestion = mkElt("button", undefined, "?");
            const btnDelete = mkElt("button", undefined, "⌫");
            const btnParagraph = mkElt("button", undefined, "¶");
            const btnEdit = mkElt("button", undefined, "✎");

            const divEditButtons = document.getElementById("edit-buttons");
            divEditButtons.append(
                btnDot,
                btnExclamation,
                btnQuestion,
                btnDelete,
                btnParagraph,
                btnEdit
            );
        }
    </script>
</body>

</html>
