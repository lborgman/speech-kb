<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg" href="./img/speech-kb.svg">
    <style>
        :root {
            --color-for-edit: white;
            --color-for-edit: orange;
            --color-for-edit: lightblue;
            --color-for-edit: yellow;
        }

        [inert] {
            cursor: default;
            filter: grayscale(1);
            opacity: 0.8;
            color: gray;
            outline: dotted 4px red !important;

            input[type=radio] {
                opacity: 0.5;
            }

            button {
                color: white;
            }
        }

        #result-log {
            border: 2px dotted red;
            background: yellow;
            display: none;
        }

        #logo {
            display: block;
            width: 60px;
            height: 60px;
            background-image: url(./img/speech-kb.svg);
            outline: 1px dotted red;
        }

        #inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #buttons {
            display: flex;
            gap: 10px;
        }

        #edit-buttons {
            display: flex;
            gap: 15px;
            margin-top: 2px;

            button {
                background: yellow;
                background: lightblue;
                background-color: var(--color-for-edit);
                border: 1px solid gray;
                border-radius: 10px;
                padding: 4px;
                aspect-ratio: 1 / 1;
                width: 32px;
                display: flex;
                justify-content: center;
                align-items: center;

            }
        }

        #output-text {
            .final-out:last-child {
                background-color: var(--color-for-edit);
            }
        }

        #output-text {
            width: 100%;
            min-height: 80px;
            background: #ccc;
            padding: 10px;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
    <script src="./init-error-new.js"></script>
</head>

        function startListening() {
            recognition.lang = langSelect.value;
            recognition.start();
            eltMicStatus.textContent = "Microphone is active. Speak now...";
        }

        // 2. STOP: Stops listening and FINISHES processing current speech
        function stopListening() {
            recognition.stop();
            eltMicStatus.textContent = "Microphone turned off. Processing final audio...";
        }

        // 3. ABORT: Instantly kills the microphone and THROWS AWAY current speech
        function cancelListening() {
            recognition.abort();
            eltMicStatus.textContent = "Speech recognition canceled instantly.";
        }
